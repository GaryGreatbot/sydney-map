    }

    venues.forEach(v => {
      const marker = L.circleMarker([v.lat, v.lng], {
        radius: 7,
        color: '#fff',
        weight: 2,
        fillColor: COLORS[v.category],
        fillOpacity: 0.92
      });
      marker.bindPopup(popupHtml(v));
      marker.addTo(layerByCat[v.category]);
    });

    function refreshLayers() {
      Object.entries(layerByCat).forEach(([cat, layer]) => {
        const on = active.has(cat);
        if (on && !map.hasLayer(layer)) layer.addTo(map);
        if (!on && map.hasLayer(layer)) map.removeLayer(layer);
      });
    }

    refreshLayers();

    function setBtn(cat, on) {
      const btn = document.querySelector(`.filter-btn[data-category="${cat}"]`);
      if (!btn) return;
      if (cat === 'all') {
        btn.style.background = on ? '#111' : 'white';
        btn.style.color = on ? 'white' : '#111';
        return;
      }
      btn.style.background = on ? COLORS[cat] : 'white';
      btn.style.color = on ? 'white' : COLORS[cat];
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      const cat = btn.dataset.category;
      btn.addEventListener('click', () => {
        if (cat === 'all') {
          const allOn = active.size === 6;
          if (allOn) active.clear();
          else ['cafe','restaurant','store','hotel','wellness','attraction'].forEach(c => active.add(c));

          setBtn('all', active.size === 6);
          ['cafe','restaurant','store','hotel','wellness','attraction'].forEach(c => setBtn(c, active.has(c)));
          refreshLayers();
          return;
        }

        if (active.has(cat)) active.delete(cat);
        else active.add(cat);

        setBtn(cat, active.has(cat));
        setBtn('all', active.size === 6);
        refreshLayers();
      });
    });
  </script>
</body>
</html>
