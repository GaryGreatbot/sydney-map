  infoWindow = new google.maps.InfoWindow();

  document.getElementById('zoom-in').addEventListener('click', () => map.setZoom(map.getZoom() + 1));
  document.getElementById('zoom-out').addEventListener('click', () => map.setZoom(map.getZoom() - 1));

  venues.forEach(v => {
    const marker = new google.maps.Marker({
      position: { lat: v.lat, lng: v.lng },
      map,
      title: v.name,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        fillColor: COLORS[v.category],
        fillOpacity: 0.92,
        strokeColor: '#ffffff',
        strokeWeight: 2,
        scale: 9
      }
    });
    marker._cat = v.category;
    marker.addListener('click', () => {
      infoWindow.setContent(`
        <div class="iw">
          <h3>${v.name}</h3>
          <span class="tag" style="background:${COLORS[v.category]}">${LABELS[v.category]}</span>
          <div class="meta">
            <span>📍 ${v.suburb}</span>
            <span style="color:#888">🍴 ${v.type}</span>
            <span style="color:#bbb; font-size:11px;">Guide ${v.page}</span>
          </div>
        </div>
      `);
      infoWindow.open(map, marker);
    });
    markers.push(marker);
  });

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const cat = btn.dataset.category;
    if (!cat) return;

    // Set initial active style
    if (cat !== 'all') {
      btn.style.background = COLORS[cat];
      btn.style.color = 'white';
    } else {
      btn.style.background = '#111';
      btn.style.color = 'white';
    }

    btn.addEventListener('click', () => {
      if (cat === 'all') {
        const allOn = activeCategories.size === 6;
        if (allOn) {
          activeCategories.clear();
          btn.style.background = 'white';
          btn.style.color = '#111';
          document.querySelectorAll('.filter-btn[data-category]:not([data-category="all"])').forEach(b => {
            b.style.background = 'white';
            b.style.color = COLORS[b.dataset.category];
          });
        } else {
          ['cafe','restaurant','store','hotel','wellness','attraction'].forEach(c => activeCategories.add(c));
          btn.style.background = '#111';
          btn.style.color = 'white';
          document.querySelectorAll('.filter-btn[data-category]:not([data-category="all"])').forEach(b => {
            b.style.background = COLORS[b.dataset.category];
            b.style.color = 'white';
          });
        }
      } else {
        if (activeCategories.has(cat)) {
          activeCategories.delete(cat);
          btn.style.background = 'white';
          btn.style.color = COLORS[cat];
        } else {
          activeCategories.add(cat);
          btn.style.background = COLORS[cat];
          btn.style.color = 'white';
        }
        // Update "all" button state
        const allBtn = document.querySelector('.filter-btn[data-category="all"]');
        if (activeCategories.size === 6) {
          allBtn.style.background = '#111';
          allBtn.style.color = 'white';
        } else {
          allBtn.style.background = 'white';
          allBtn.style.color = '#111';
        }
      }
      markers.forEach(m => m.setVisible(activeCategories.has(m._cat)));
    });
  });
}
</script>
